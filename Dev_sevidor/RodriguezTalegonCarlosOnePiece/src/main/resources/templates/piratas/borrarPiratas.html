<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Borrar Piratas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h2 class="text-center mb-4">Borrar Piratas</h2>

    <!-- FORMULARIO BUSCAR -->
    <form th:action="@{/piratas/formularioBorrarPiratas}" method="post" class="mb-4">
        <div class="row">
            <div class="col-md-4">
                <input type="number" name="id" class="form-control" placeholder="ID Pirata">
            </div>
            <div class="col-md-4">
                <input type="text" name="nombre" class="form-control" placeholder="Nombre Pirata">
            </div>
            <div class="col-md-4">
                <button class="btn btn-danger w-100" type="submit">Buscar</button>
            </div>
        </div>
    </form>

    <!-- RESULTADOS -->
    <table class="table table-striped" th:if="${lista != null}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Fruta</th>
            <th>Isla</th>
            <th>Estado</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="pirata : ${lista}">
            <td th:text="${pirata.id}"></td>
            <td th:text="${pirata.nombre}"></td>
            <td th:text="${pirata.frutaDelDiablo != null ? pirata.frutaDelDiablo : 'Sin fruta'}"></td>
            <td th:text="${pirata.isla != null ? pirata.isla.nombre : 'Sin isla'}"></td>
            <td>
                <span class="badge bg-success" th:if="${pirata.estaActivo}">Activo</span>
                <span class="badge bg-danger" th:if="${!pirata.estaActivo}">Inactivo</span>
            </td>
            <td>
                <form th:action="@{/piratas/borrarPirata}" method="post">
                    <input type="hidden" name="id" th:value="${pirata.id}">
                    <button class="btn btn-sm btn-danger">Borrar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${resultado != null}" class="alert alert-success text-center">
        Pirata con ID <b th:text="${resultado}"></b> desactivado correctamente
    </div>

</div>
</body>
</html>
