<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalles Tripulación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h2 class="text-center mb-4">Detalles de la Tripulación</h2>

    <!-- DATOS TRIPULACIÓN -->
    <div class="card mb-4">
        <div class="card-body">
            <h4 th:text="${tripulacion.nombre}"></h4>
            <p><b>Barco:</b> <span th:text="${tripulacion.barco}"></span></p>
            <p>
                <b>Estado:</b>
                <span class="badge bg-success" th:if="${tripulacion.estaActiva}">Activa</span>
                <span class="badge bg-danger" th:if="${!tripulacion.estaActiva}">Inactiva</span>
            </p>
        </div>
    </div>

    <!-- MIEMBROS -->
    <h4 class="mb-3">Miembros Actuales</h4>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Pirata</th>
            <th>Rol</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="miembro : ${miembros}">
            <td th:text="${miembro.pirata.nombre}"></td>
            <td th:text="${miembro.rol}"></td>
            <td>
                <form th:action="@{/tripulaciones/eliminarMiembro}" method="post">
                    <input type="hidden" name="idPirata" th:value="${miembro.pirata.id}">
                    <input type="hidden" name="idTripulacion" th:value="${tripulacion.id}">
                    <button class="btn btn-sm btn-danger">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- AÑADIR MIEMBRO -->
    <h4 class="mt-4">Agregar Miembro</h4>

    <form th:action="@{/tripulaciones/agregarMiembro}" method="post">
        <input type="hidden" name="idTripulacion" th:value="${tripulacion.id}">

        <div class="row">
            <div class="col-md-4">
                <select name="idPirata" class="form-select" required>
                    <option value="">Selecciona pirata</option>
                    <option th:each="p : ${piratasActivos}"
                            th:value="${p.id}"
                            th:text="${p.nombre}">
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <input type="text" name="rol" class="form-control" placeholder="Rol" required>
            </div>

            <div class="col-md-4">
                <button class="btn btn-success w-100">Agregar</button>
            </div>
        </div>
    </form>

    <div class="mt-4">
        <a th:href="@{/tripulaciones/listadoTripulaciones}" class="btn btn-secondary">
            Volver al listado
        </a>
    </div>

</div>
</body>
</html>
