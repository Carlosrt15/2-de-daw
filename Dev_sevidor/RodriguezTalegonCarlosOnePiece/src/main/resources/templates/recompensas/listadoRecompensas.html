<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Recompensas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h2 class="text-center mb-4">Listado de Recompensas</h2>

    <!-- FILTROS -->
    <form th:action="@{/recompensas/listadoRecompensas}" method="post" class="row g-3 mb-4">
        <div class="col-md-3">
            <label class="form-label">Nombre Pirata</label>
            <input type="text" name="nombrePirata" class="form-control">
        </div>

        <div class="col-md-3">
            <label class="form-label">Tripulación</label>
            <select name="idTripulacion" class="form-select">
                <option value="">Todas</option>
                <option th:each="t : ${tripulacionesActivas}"
                        th:value="${t.id}"
                        th:text="${t.nombre}">
                </option>
            </select>
        </div>

        <div class="col-md-3">
            <label class="form-label">Cantidad mínima</label>
            <input type="number" step="0.01" name="cantidad" class="form-control">
        </div>

        <div class="col-md-3 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="estaVigente" value="1">
                <label class="form-check-label">Solo vigentes</label>
            </div>
        </div>

        <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
    </form>

    <!-- RESULTADOS -->
    <div th:if="${lista == null or lista.isEmpty()}" class="alert alert-warning text-center">
        No hay recompensas que mostrar
    </div>

    <table th:if="${lista != null and !lista.isEmpty()}"
           class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Pirata</th>
            <th>Cantidad</th>
            <th>Vigente</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="recompensa : ${lista}">
            <td th:text="${recompensa.id}"></td>
            <td th:text="${recompensa.pirata.nombre}"></td>
            <td th:text="${recompensa.cantidad}"></td>
            <td>
                <span th:if="${recompensa.estaVigente}" class="badge bg-success">Sí</span>
                <span th:if="${!recompensa.estaVigente}" class="badge bg-danger">No</span>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
