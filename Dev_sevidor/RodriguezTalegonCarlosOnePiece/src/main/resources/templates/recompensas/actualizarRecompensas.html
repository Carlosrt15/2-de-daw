<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Recompensas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h2 class="text-center mb-4">Actualizar Recompensas</h2>

    <!-- FORMULARIO BÚSQUEDA -->
    <form th:action="@{/recompensas/formularioActualizarRecompensas}" method="post"
          class="row g-3 mb-4">

        <div class="col-md-3">
            <label class="form-label">ID Recompensa</label>
            <input type="number" name="id" class="form-control">
        </div>

        <div class="col-md-3">
            <label class="form-label">Nombre Pirata</label>
            <input type="text" name="nombrePirata" class="form-control">
        </div>

        <div class="col-md-3 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="estaVigente" value="1">
                <label class="form-check-label">Solo vigentes</label>
            </div>
        </div>

        <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
    </form>

    <!-- RESULTADOS -->
    <div th:if="${lista == null or lista.isEmpty()}" class="alert alert-warning text-center">
        No hay recompensas para actualizar
    </div>

    <div th:each="recompensa : ${lista}" class="card mb-3">
        <div class="card-body">

            <form th:action="@{/recompensas/actualizarRecompensa}" method="post"
                  class="row g-3">

                <input type="hidden" name="id" th:value="${recompensa.id}">

                <div class="col-md-3">
                    <label class="form-label">Pirata</label>
                    <select name="idPirata" class="form-select">
                        <option th:each="p : ${piratasActivos}"
                                th:value="${p.id}"
                                th:text="${p.nombre}"
                                th:selected="${p.id == recompensa.pirata.id}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="cantidad"
                           class="form-control"
                           th:value="${recompensa.cantidad}">
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               name="estaVigente"
                               th:checked="${recompensa.estaVigente}">
                        <label class="form-check-label">Vigente</label>
                    </div>
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100">
                        Actualizar
                    </button>
                </div>

            </form>

            <p class="mt-2">
                <strong>Pirata:</strong>
                <span th:text="${recompensa.pirata.nombre}"></span>
            </p>

        </div>
    </div>

</div>
</body>
</html>
