<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Borrar Recompensas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <h2 class="text-center mb-4">Borrar Recompensas</h2>

    <!-- FORMULARIO BUSCAR POR ID -->
    <form th:action="@{/recompensas/formularioBorrarRecompensas}" method="post" class="mb-4">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <input type="number" name="id" class="form-control" placeholder="ID Recompensa">
            </div>
            <div class="col-md-4">
                <button class="btn btn-danger w-100" type="submit">Buscar</button>
            </div>
        </div>
    </form>

    <!-- RESULTADOS -->
    <table class="table table-striped" th:if="${lista != null and !lista.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Pirata</th>
            <th>Cantidad</th>
            <th>Vigente</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="recompensa : ${lista}">
            <td th:text="${recompensa.id}"></td>
            <td th:text="${recompensa.pirata.nombre}"></td>
            <td th:text="${recompensa.cantidad}"></td>
            <td>
                <span class="badge bg-success" th:if="${recompensa.estaVigente}">Sí</span>
                <span class="badge bg-secondary" th:if="${!recompensa.estaVigente}">No</span>
            </td>
            <td>
                <form th:action="@{/recompensas/borrarRecompensa}" method="post">
                    <input type="hidden" name="id" th:value="${recompensa.id}">
                    <button class="btn btn-sm btn-danger">Borrar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- MENSAJE OK -->
    <div th:if="${resultado != null}" class="alert alert-success text-center">
        Recompensa con ID <b th:text="${resultado}"></b> eliminada correctamente
    </div>

</div>
</body>
</html>
